# foot terminal config
# Launch fish explicitly — the Sway session's $SHELL is /bin/bash, and foot
# otherwise follows $SHELL rather than the passwd login shell.
shell=/usr/bin/fish

# Font: family:size=N. Falls back to monospace until fonts-firacode is
# installed (sudo apt install fonts-firacode). Adjust size to taste.
font=Fira Code:size=12

[colors]
# Background transparency: 1.0 = opaque, 0.0 = fully transparent.
# Applies to the background only; text stays opaque. Tune to taste once the
# rendered wallpaper exists.
alpha=0.7

# Tokyo Night palette (foot uses RRGGBB, no leading '#').
foreground=c0caf5
background=1a1b26
selection-foreground=c0caf5
selection-background=283457
regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6
bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5
